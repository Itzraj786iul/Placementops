name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://placementos:placementos@localhost:5432/placementos

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build --workspace=@placementos/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  api-check:
    name: API Tests & Verify
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Setup PostgreSQL
        run: |
          sudo systemctl start postgresql
          sudo -u postgres psql -c "CREATE USER placementos WITH PASSWORD 'placementos';" || true
          sudo -u postgres psql -c "CREATE DATABASE placementos OWNER placementos;" || true
          sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE placementos TO placementos;"

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install pytest

      - name: Verify API imports
        run: |
          cd apps/api
          python -c "from app.api import api_router; from main import app; print('API imports OK')"

      - name: Run database migrations
        run: |
          cd apps/api
          alembic upgrade head

      - name: Run API tests
        run: |
          cd apps/api
          python -m pytest tests/ -q

      - name: Start API server
        run: |
          cd apps/api
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          sleep 5
        env:
          CORS_ORIGINS: http://localhost:3000
          FRONTEND_URL: http://localhost:3000
          JWT_SECRET_KEY: ci-test-secret-key
          API_RELOAD: "false"

      - name: Verify health endpoint
        run: curl -f http://localhost:8000/health
