# Free-tier Blueprint for PlacementOS API (Render)
# https://render.com/docs/blueprint-spec
#
# Dashboard → New → Blueprint → connect this repo.
# Pin Python 3.12 so wheels install quickly (avoid 3.14 source builds).

services:
  - type: web
    name: placementos-api
    runtime: python
    plan: free
    rootDir: apps/api
    pythonVersion: "3.12.8"
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: COOKIE_SECURE
        value: "true"
      - key: ENABLE_DEV_LOGIN
        value: "false"
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_PROVIDER
        value: "resend"